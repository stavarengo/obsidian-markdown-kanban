# Git hooks are convenience only (blueprint §30). CI and `pnpm verify` are
# authoritative — hooks can be bypassed locally with --no-verify, CI cannot.
pre-commit:
  parallel: true
  commands:
    lint-and-format:
      glob: "*.{ts,tsx}"
      run: pnpm eslint {staged_files} && pnpm prettier --write {staged_files}
      stage_fixed: true
    format-data:
      glob: "*.{json,mjs,cjs,yml,yaml}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
    lint-docs:
      glob: "*.md"
      run: pnpm markdownlint-cli2 {staged_files}
      stage_fixed: true

pre-push:
  commands:
    verify:
      run: pnpm verify
