name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Release Obsidian plugin
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve and verify release tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Plain semver only (no "v" prefix) — matches manifest.version and the
          # release-it tag contract, and rejects odd tags the "*.*.*" glob admits.
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Error: tag '$TAG' is not a plain semver release tag (e.g. 1.2.3)." >&2
            exit 1
          fi

          # Only release tags whose commit is on main, so a stray tag on an
          # unmerged or forked commit cannot trigger a publish.
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$TAG^{commit}" FETCH_HEAD; then
            echo "Error: tag '$TAG' is not reachable from origin/main; refusing to release." >&2
            exit 1
          fi

          if [[ "$TAG" == *"-"* ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/main.js
            dist/styles.css

      - name: Check GitHub release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=(
            "${{ steps.version.outputs.tag }}"
            --title "${{ steps.version.outputs.tag }}"
            --generate-notes
          )

          if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"

      - name: Upload Obsidian plugin assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.version.outputs.tag }}" dist/main.js dist/manifest.json dist/styles.css --clobber
