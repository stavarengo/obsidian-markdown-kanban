name: Create Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.OBSIDIAN_MARKDOWN_KANBAN_RELEASE_IT_GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create release
        env:
          OBSIDIAN_MARKDOWN_KANBAN_RELEASE_IT_GITHUB_TOKEN: ${{ secrets.OBSIDIAN_MARKDOWN_KANBAN_RELEASE_IT_GITHUB_TOKEN }}
        run: pnpm ci:release
